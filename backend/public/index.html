<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WASAC — Smart Water Leak Monitor</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; }
  header { background: #161b22; padding: 16px 24px; border-bottom: 1px solid #30363d;
           display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  header .badge { background: #238636; color: #fff; padding: 3px 10px;
                  border-radius: 20px; font-size: 0.75rem; }
  .badge.alert { background: #da3633; }

  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
          padding: 24px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
          padding: 16px; }
  .card h3 { font-size: 0.78rem; color: #8b949e; text-transform: uppercase;
             letter-spacing: 0.05em; margin-bottom: 8px; }
  .card .value { font-size: 2rem; font-weight: 700; }
  .card .unit  { font-size: 0.85rem; color: #8b949e; }
  .normal  { color: #3fb950; }
  .leak    { color: #f85149; }
  .warning { color: #d29922; }

  .panel { margin: 0 24px 24px; background: #161b22;
           border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
  .panel-header { padding: 12px 16px; background: #21262d;
                  font-size: 0.85rem; font-weight: 600; border-bottom: 1px solid #30363d; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { padding: 10px 16px; text-align: left; color: #8b949e;
       background: #0d1117; border-bottom: 1px solid #30363d; }
  td { padding: 10px 16px; border-bottom: 1px solid #21262d; }
  tr.leak-row { background: rgba(248, 81, 73, 0.08); }
  tr:hover { background: #21262d; }

  #status-dot { width: 10px; height: 10px; border-radius: 50%;
                background: #3fb950; display: inline-block; margin-right: 6px; }
  #status-dot.disconnected { background: #f85149; }

  .alert-banner { display: none; background: #da3633; color: #fff;
                  text-align: center; padding: 12px; font-weight: 600;
                  animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
</style>
</head>
<body>

<header>
  <span id="status-dot"></span>
  <h1>WASAC — Smart Water Monitoring Dashboard</h1>
  <span id="conn-badge" class="badge">Connecting...</span>
  <span style="margin-left:auto;font-size:0.8rem;color:#8b949e" id="last-update">—</span>
</header>

<div id="alert-banner" class="alert-banner">🚨 LEAK DETECTED — Check the readings table below</div>

<div class="grid">
  <div class="card">
    <h3>Pressure</h3>
    <div class="value" id="v-pressure">—</div>
    <div class="unit">bar</div>
  </div>
  <div class="card">
    <h3>Flow Rate</h3>
    <div class="value" id="v-flow">—</div>
    <div class="unit">L/min</div>
  </div>
  <div class="card">
    <h3>Status</h3>
    <div class="value normal" id="v-status">—</div>
    <div class="unit" id="v-confidence">—</div>
  </div>
  <div class="card">
    <h3>Total Alerts</h3>
    <div class="value warning" id="v-alerts">0</div>
    <div class="unit">since startup</div>
  </div>
</div>

<div class="panel">
  <div class="panel-header">Live Readings (last 50)</div>
  <table>
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>Pressure</th>
        <th>Flow Rate</th>
        <th>Temperature</th>
        <th>Vibration</th>
        <th>Result</th>
        <th>Confidence</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="readings-body"></tbody>
  </table>
</div>

<script>
  const socket   = io();
  let alertCount = 0;

  socket.on('connect', () => {
    document.getElementById('status-dot').classList.remove('disconnected');
    document.getElementById('conn-badge').textContent = 'Connected';
    document.getElementById('conn-badge').classList.remove('alert');
    document.getElementById('conn-badge').style.background = '#238636';
  });

  socket.on('disconnect', () => {
    document.getElementById('status-dot').classList.add('disconnected');
    document.getElementById('conn-badge').textContent = 'Disconnected';
    document.getElementById('conn-badge').classList.add('alert');
  });

  socket.on('reading', (data) => {
    const s = data.sensor || {};
    document.getElementById('v-pressure').textContent   = s.Pressure   ?? '—';
    document.getElementById('v-flow').textContent       = s.Flow_Rate  ?? '—';
    document.getElementById('v-status').className       = 'value ' + (data.result === 'LEAK DETECTED' ? 'leak' : 'normal');
    document.getElementById('v-status').textContent     = data.result  ?? '—';
    document.getElementById('v-confidence').textContent = data.confidence ?? '—';
    document.getElementById('last-update').textContent  = 'Last update: ' + new Date(data.timestamp).toLocaleTimeString();
    addRow(data, s);
  });

  socket.on('leak_alert', (data) => {
    alertCount++;
    document.getElementById('v-alerts').textContent = alertCount;
    const banner = document.getElementById('alert-banner');
    banner.style.display = 'block';
    setTimeout(() => { banner.style.display = 'none'; }, 8000);
  });

  function addRow(data, s) {
    const tbody  = document.getElementById('readings-body');
    const isLeak = data.result === 'LEAK DETECTED';
    const tr     = document.createElement('tr');
    if (isLeak) tr.classList.add('leak-row');
    tr.innerHTML = `
      <td>${new Date(data.timestamp).toLocaleTimeString()}</td>
      <td>${s.Pressure ?? '—'}</td>
      <td>${s.Flow_Rate ?? '—'}</td>
      <td>${s.Temperature ?? '—'}</td>
      <td>${s.Vibration ?? '—'}</td>
      <td class="${isLeak ? 'leak' : 'normal'}">${data.result}</td>
      <td>${data.confidence}</td>
      <td>${data.action}</td>
    `;
    tbody.insertBefore(tr, tbody.firstChild);
    if (tbody.children.length > 50) tbody.removeChild(tbody.lastChild);
  }
</script>
</body>
</html>
